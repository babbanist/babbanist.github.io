:root {
  --bg: #f5f0e8;
  --ink: #1a1410;
  --muted: #8a7f72;
  --accent: #c84b2f;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px;
  z-index: 10;
}

main {
  max-width: 480px;
  width: 100%;
  opacity: 0;
  transform: translateY(18px);
  animation: appear 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
}

@keyframes appear {
  to { opacity: 1; transform: translateY(0); }
}

.label {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.2rem;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  line-height: 1.0;
  margin-bottom: 1.6rem;
  letter-spacing: -0.02em;
}

h1 em {
  font-style: italic;
  color: var(--accent);
}

p {
  font-size: 0.85rem;
  line-height: 1.75;
  color: var(--muted);
  margin-bottom: 2.4rem;
  max-width: 360px;
}

.links {
  display: flex;
  gap: 1.6rem;
  flex-wrap: wrap;
}

.links a {
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
}

.links a:hover {
  color: var(--accent);
  border-color: var(--accent);
}

.divider {
  width: 2rem;
  height: 1px;
  background: var(--accent);
  margin: 2rem 0;
}

footer {
  margin-top: 4rem;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

  <main>
    <p class="label">babbanist.github.io</p>
    <h1>Hoi, ik ben <em>babbanist.</em></h1>
    <div class="divider"></div>
    <p>Dit is mijn kleine plek op het internet. Meer komt nog.</p>
    <nav class="links">
      <a href="https://github.com/babbanist" target="_blank">GitHub</a>
    </nav>

  </main>
