<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#090909; --surface:#0f0f11; --card:#131316; --card-hover:#17171b;
  --border:#1e1e24; --border-light:#2a2a33; --text:#dddde8;
  --muted:#55556a; --muted2:#3a3a4a; --white:#f0f0f8;
  --ff-serif:'Playfair Display',Georgia,serif;
  --ff-mono:'IBM Plex Mono',monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--ff-mono); min-height:100vh; padding:40px 20px 80px; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 120% 50% at 15% 0%,rgba(168,103,232,.055),transparent 60%),radial-gradient(ellipse 90% 60% at 85% 100%,rgba(103,181,232,.04),transparent 60%),radial-gradient(ellipse 55% 45% at 50% 48%,rgba(200,169,126,.022),transparent 70%); pointer-events:none; z-index:0; }
.wrap { max-width:1080px; margin:0 auto; position:relative; z-index:1; }

/* HEADER */
.header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:40px; padding-bottom:24px; border-bottom:1px solid var(--border); }
.header h1 { font-family:var(--ff-serif); font-size:2.8rem; font-weight:400; color:var(--white); letter-spacing:-.02em; line-height:1; }
.header h1 em { font-style:italic; }
.h1-letter { transition:color .4s ease; }
.clock-block { text-align:right; }
.clock-time { font-size:1.4rem; font-weight:500; color:var(--white); letter-spacing:.04em; font-variant-numeric:tabular-nums; }
.clock-date { font-size:10px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-top:4px; }

/* OVERVIEW */
.overview { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:24px; }
.ov { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; animation:fadeUp .4s ease both; }
.ov-label { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px; }
.ov-value { font-size:13px; color:var(--white); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ov-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.ov.next { border-color:var(--next-color,var(--border)); }

/* HIDDEN PANEL */
.hidden-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px 20px; margin-bottom:24px; display:none; }
.hidden-panel.has-items { display:block; }
.hidden-panel-title { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:12px; }
.hidden-chips { display:flex; flex-wrap:wrap; gap:8px; }
.hidden-chip { display:flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--border-light); border-radius:20px; padding:6px 12px 6px 10px; cursor:pointer; transition:border-color .2s; -webkit-tap-highlight-color:transparent; }
.hidden-chip:hover { border-color:var(--muted); }
.hidden-chip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.hidden-chip-name { font-family:var(--ff-mono); font-size:11px; color:var(--text); }
.hidden-chip-add { font-size:13px; color:var(--muted); line-height:1; }

/* SPECTRUM */
.spectrum-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 24px 32px; margin-bottom:24px; }
.spectrum-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:12px; flex-wrap:wrap; }
.spectrum-title { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; }
.spectrum-year-widget { display:flex; align-items:center; gap:7px; }
.spectrum-year-box { background:var(--surface); border:1px solid var(--border-light); border-radius:6px; color:var(--white); font-family:var(--ff-mono); font-size:12px; font-weight:500; padding:5px 10px; cursor:ns-resize; user-select:none; -webkit-user-select:none; font-variant-numeric:tabular-nums; letter-spacing:.04em; transition:border-color .2s; }
.spectrum-year-box:hover { border-color:var(--muted); }
.spectrum-now-btn { background:none; border:1px solid var(--border-light); border-radius:6px; color:var(--muted); font-family:var(--ff-mono); font-size:10px; padding:5px 10px; cursor:pointer; transition:border-color .15s,color .15s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.spectrum-now-btn:hover { border-color:var(--muted); color:var(--white); }
.spectrum-now-btn.hidden { display:none; }
.spectrum { position:relative; height:52px; }
.spectrum-axis { position:absolute; bottom:0; left:0; right:0; height:1px; background:var(--border); }
.spectrum-dot { position:absolute; bottom:0; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; cursor:pointer; }
.spectrum-dot-circle { width:8px; height:8px; border-radius:50%; position:relative; bottom:-4px; transition:transform .2s; }
.spectrum-dot:hover .spectrum-dot-circle { transform:scale(1.6); }
.spectrum-dot-label { position:absolute; bottom:12px; font-size:10px; white-space:nowrap; font-weight:500; }
.spectrum-dot-age { position:absolute; bottom:-20px; font-size:9px; color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums; }
.spectrum-tick { position:absolute; bottom:0; transform:translateX(-50%); font-size:8px; color:var(--muted2); padding-bottom:6px; }
.spectrum-tick::before { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:1px; height:4px; background:var(--muted2); }
.spectrum-dot-hide { position:absolute; bottom:16px; right:-10px; background:var(--card); border:1px solid var(--border); border-radius:50%; width:16px; height:16px; font-size:9px; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:0; transition:opacity .15s; line-height:1; color:var(--muted); }
.spectrum-dot:hover .spectrum-dot-hide { opacity:1; }

/* COMPARE */
.compare-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:24px; }
.compare-title { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
.compare-title:hover { color:var(--text); }
.compare-toggle-icon { font-size:14px; color:var(--muted2); transition:transform .35s ease; line-height:1; }
.compare-toggle-icon.open { transform:rotate(180deg); }
.compare-body { overflow:hidden; max-height:800px; transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease,margin-top .3s ease; opacity:1; margin-top:12px; }
.compare-body.collapsed { max-height:0; opacity:0; margin-top:0; }
.compare-picker { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
.cmp-chip { display:flex; align-items:center; gap:6px; border:1px solid var(--border-light); border-radius:20px; padding:6px 13px; cursor:pointer; font-family:var(--ff-mono); font-size:11px; color:var(--muted); background:var(--surface); transition:border-color .15s,color .15s,background .15s; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
.cmp-chip:hover { border-color:var(--muted); color:var(--text); }
.cmp-chip.selected { color:var(--white); background:var(--card-hover); }
.cmp-chip-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.cmp-chip-badge { font-size:9px; font-weight:500; margin-left:1px; opacity:.7; }
.cmp-hint { font-size:10px; color:var(--muted2); margin-bottom:12px; letter-spacing:.04em; }
.compare-results { display:none; border-top:1px solid var(--border); padding-top:16px; }
.compare-results.visible { display:block; }
.compare-cols { display:grid; gap:0; }
.compare-cols.two { grid-template-columns:1fr auto 1fr; }
.compare-cols.three { grid-template-columns:1fr auto 1fr auto 1fr; }
.compare-side { padding:0 10px; }
.compare-side-name { font-family:var(--ff-serif); font-size:1.1rem; color:var(--white); margin-bottom:10px; }
.compare-stat { padding:5px 0; border-bottom:1px solid var(--border); }
.compare-stat:last-child { border-bottom:none; }
.compare-stat-label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.compare-stat-val { font-size:12px; color:var(--text); margin-top:1px; font-variant-numeric:tabular-nums; }
.compare-middle { padding:0 12px; display:flex; flex-direction:column; align-items:center; border-left:1px solid var(--border); border-right:1px solid var(--border); }
.compare-mid-item { text-align:center; padding:6px 0; width:100%; border-bottom:1px solid var(--border); }
.compare-mid-item:last-child { border-bottom:none; }
.compare-mid-label { font-size:9px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
.compare-mid-val { font-size:11px; color:var(--white); margin-top:2px; font-weight:500; }
.compare-mid-val.accent { color:#c8a97e; }
.compare-combined { margin-top:14px; padding:14px 0 2px; border-top:1px solid var(--border); display:flex; gap:24px; flex-wrap:wrap; }
.compare-combined-item { display:flex; flex-direction:column; gap:2px; }
.compare-combined-label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.compare-combined-val { font-size:14px; color:#c8a97e; font-weight:500; font-variant-numeric:tabular-nums; }

/* CARDS */
.section-label { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:12px; }
.cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; overflow:hidden; transition:border-color .25s,background .25s; animation:fadeUp .5s ease both; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.card:hover { background:var(--card-hover); }
.card-topline { position:absolute; top:0; left:0; right:0; height:1px; opacity:.5; }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.card-name { font-family:var(--ff-serif); font-size:1.5rem; font-weight:400; color:var(--white); line-height:1; }
.card-icons { display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1; opacity:.7; }
.card-zodiac { font-size:16px; line-height:1; }
.card-cn { font-size:13px; line-height:1; }
.card-dob { font-size:10px; color:var(--muted); margin-bottom:2px; letter-spacing:.06em; }
.card-weekday { font-size:9px; color:var(--muted2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; margin-bottom:10px; }
.stat { display:flex; flex-direction:column; gap:1px; }
.stat-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.stat-v { font-size:12px; color:var(--text); font-variant-numeric:tabular-nums; }
.stat-v.big { font-size:14px; color:var(--white); font-weight:500; }
.exact-time { font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums; margin-bottom:10px; letter-spacing:.04em; }
.exact-time span { color:var(--text); }
.bd-block { background:rgba(255,255,255,.025); border:1px solid var(--border); border-radius:6px; padding:10px 12px; }
.bd-label { font-size:9px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:4px; }
.bd-countdown { font-size:12px; font-weight:500; font-variant-numeric:tabular-nums; margin-bottom:6px; }
.bd-today { font-size:12px; color:#7ec880; font-weight:500; }
.bd-bar { height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.bd-fill { height:100%; border-radius:2px; }
.bd-prog-label { display:flex; justify-content:space-between; margin-top:3px; font-size:9px; color:var(--muted2); }
.card-hint { position:absolute; bottom:10px; right:12px; font-size:9px; color:var(--muted2); opacity:0; transition:opacity .2s; letter-spacing:.06em; pointer-events:none; }
.card:hover .card-hint { opacity:1; }
.card-hide-btn { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted2); font-size:15px; cursor:pointer; opacity:0; transition:opacity .2s,color .2s; padding:2px 4px; line-height:1; z-index:2; -webkit-tap-highlight-color:transparent; }
.card:hover .card-hide-btn { opacity:1; }
.card-hide-btn:hover { color:var(--muted); }

/* FULLSCREEN */
.fs-overlay { position:fixed; inset:0; z-index:1000; display:none; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.fs-overlay.open { display:block; }
.fs-bg { position:fixed; inset:0; background:rgba(5,5,7,.97); }
.fs-content { position:relative; z-index:2; min-height:100vh; padding:48px 24px 100px; max-width:860px; margin:0 auto; }
.fs-close { position:fixed; top:20px; right:20px; background:var(--card); border:1px solid var(--border); border-radius:50%; width:40px; height:40px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:18px; z-index:10; font-family:sans-serif; -webkit-tap-highlight-color:transparent; }
.fs-hero { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border); gap:20px; flex-wrap:wrap; }
.fs-name { font-family:var(--ff-serif); font-size:clamp(2.5rem,7vw,5rem); font-weight:400; color:var(--white); line-height:.95; margin-bottom:12px; }
.fs-name em { font-style:italic; }
.fs-meta { font-size:11px; color:var(--muted); letter-spacing:.08em; line-height:2; text-transform:uppercase; }
.fs-age-hero { text-align:right; flex-shrink:0; }
.fs-age-big { font-family:var(--ff-serif); font-size:clamp(2.5rem,5vw,4rem); line-height:1; }
.fs-age-label { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-top:4px; }
.fs-live-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:24px; }
.fs-live-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; }
.fs-live-label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
.fs-live-val { font-size:1rem; color:var(--white); font-weight:500; font-variant-numeric:tabular-nums; }
.fs-section { margin-bottom:22px; }
.fs-section-title { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; flex:1; transition:color .15s; }
.fs-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.fs-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
.fs-item-label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
.fs-item-val { font-size:13px; color:var(--white); font-variant-numeric:tabular-nums; }
.fs-item-sub { font-size:10px; color:var(--muted2); margin-top:2px; }
.fs-pulse-row { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.pulse-dot { width:7px; height:7px; border-radius:50%; animation:pulse 1.4s ease-in-out infinite; flex-shrink:0; }
.pulse-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.pulse-val { font-size:12px; color:var(--white); font-variant-numeric:tabular-nums; }
.bd-ring-wrap { display:flex; align-items:center; gap:20px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 20px; }
.bd-ring { position:relative; width:76px; height:76px; flex-shrink:0; }
.bd-ring svg { width:76px; height:76px; transform:rotate(-90deg); }
.bd-ring-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--white); }
.bd-ring-cd { font-size:.95rem; font-weight:500; font-variant-numeric:tabular-nums; margin-bottom:4px; }
.bd-ring-sub { font-size:10px; color:var(--muted); line-height:1.7; }
.funfacts { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.funfact { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:11px; color:var(--muted); line-height:1.5; }
.funfact strong { color:var(--white); display:block; margin-bottom:3px; font-size:12px; }
.timeline { display:flex; flex-direction:column; }
.tl-item { display:grid; grid-template-columns:56px 12px 1fr; gap:0 12px; align-items:stretch; }
.tl-age { font-family:var(--ff-serif); font-size:1.2rem; text-align:right; padding:4px 0; opacity:.65; line-height:1.2; }
.tl-line-wrap { display:flex; flex-direction:column; align-items:center; }
.tl-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:8px; }
.tl-line { width:1px; flex:1; background:var(--border); margin-top:2px; }
.tl-item:last-child .tl-line { display:none; }
.tl-body { padding:6px 0 18px; }
.tl-title { font-size:12px; color:var(--white); font-weight:500; margin-bottom:2px; }
.tl-date { font-size:10px; color:var(--muted); }
.tl-future .tl-age { opacity:.2; }
.tl-future .tl-title { color:var(--muted); }

/* TOUR */
.tour-btn { position:fixed; bottom:28px; right:24px; z-index:500; background:var(--card); border:1px solid var(--border-light); border-radius:24px; color:var(--muted); font-family:var(--ff-mono); font-size:11px; padding:10px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; letter-spacing:.06em; transition:border-color .2s,color .2s,box-shadow .2s; -webkit-tap-highlight-color:transparent; }
.tour-btn:hover { color:var(--white); border-color:var(--muted); box-shadow:0 0 20px rgba(255,255,255,.05); }
.tour-btn-dot { width:6px; height:6px; border-radius:50%; background:#c8a97e; flex-shrink:0; }
.tour-overlay { position:fixed; inset:0; z-index:2000; display:none; pointer-events:none; }
.tour-overlay.open { display:block; pointer-events:all; }
.tour-dim { position:fixed; inset:0; background:rgba(0,0,0,.75); }
.tour-spotlight { position:fixed; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,.75); border:1px solid rgba(255,255,255,.12); transition:all .35s cubic-bezier(.4,0,.2,1); pointer-events:none; z-index:2001; opacity:0; }
.tour-card { position:fixed; z-index:2003; background:#191920; border:1px solid var(--border-light); border-radius:12px; padding:20px 22px; max-width:300px; min-width:220px; box-shadow:0 8px 40px rgba(0,0,0,.7); transition:top .35s cubic-bezier(.4,0,.2,1),left .35s cubic-bezier(.4,0,.2,1); }
.tour-step-label { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-bottom:8px; }
.tour-title { font-family:var(--ff-serif); font-size:1.1rem; color:var(--white); margin-bottom:8px; line-height:1.2; }
.tour-body { font-size:11px; color:var(--muted); line-height:1.65; margin-bottom:16px; }
.tour-body strong { color:var(--text); }
.tour-nav { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.tour-nav-btns { display:flex; gap:8px; }
.tour-btn-nav { background:none; border:1px solid var(--border-light); border-radius:6px; color:var(--muted); font-family:var(--ff-mono); font-size:11px; padding:6px 12px; cursor:pointer; transition:border-color .15s,color .15s; }
.tour-btn-nav:hover { border-color:var(--muted); color:var(--white); }
.tour-btn-nav.primary { background:#c8a97e22; border-color:#c8a97e66; color:#c8a97e; }
.tour-btn-nav.primary:hover { background:#c8a97e33; border-color:#c8a97e; }
.tour-dots { display:flex; gap:5px; align-items:center; }
.tour-dot { width:5px; height:5px; border-radius:50%; background:var(--muted2); transition:background .2s,transform .2s; }
.tour-dot.active { background:#c8a97e; transform:scale(1.3); }

/* CALENDAR */
.cal-wrap { margin-top:40px; padding-top:32px; border-top:1px solid var(--border); }
.cal-header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
.cal-title { font-family:var(--ff-serif); font-size:1.4rem; font-weight:400; color:var(--white); }
.cal-year-nav { display:flex; align-items:center; gap:8px; }
.cal-year-btn { background:var(--card); border:1px solid var(--border-light); border-radius:6px; color:var(--muted); font-family:var(--ff-mono); font-size:13px; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:color .15s,border-color .15s; -webkit-tap-highlight-color:transparent; }
.cal-year-btn:hover { color:var(--white); border-color:var(--muted); }
.cal-year-input { background:var(--surface); border:1px solid var(--border-light); border-radius:6px; color:var(--white); font-family:var(--ff-mono); font-size:14px; font-weight:500; width:64px; text-align:center; padding:4px 6px; outline:none; -moz-appearance:textfield; }
.cal-year-input::-webkit-outer-spin-button,.cal-year-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.cal-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.cal-month { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.cal-month-name { font-size:9px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; padding:10px 12px 6px; border-bottom:1px solid var(--border); }

function togglePack(packId) {
  if (PACK_ACTIVE[packId]) {
    delete PACK_ACTIVE[packId];
    // Remove hidden state for this pack's members
    for (var i = 0; i < PACK_REGISTRY.length; i++) {
      if (PACK_REGISTRY[i].packId === packId) delete hiddenPeople[PACK_REGISTRY[i].idx];
    }
    // Clean cmpSel of now-invalid indices
    var stillActive = {};
    var ap = activePeople();
    for (var j = 0; j < ap.length; j++) stillActive[ap[j].i] = true;
    var cleaned = [];
    for (var j = 0; j < cmpSel.length; j++) { if (stillActive[cmpSel[j]]) cleaned.push(cmpSel[j]); }
    if (cleaned.length < 2 && ap.length >= 2) cleaned = [ap[0].i, ap[1].i];
    cmpSel = cleaned;

// ─── HELPERS ───
function pad(n)  { return String(Math.floor(n)).padStart(2,'0'); }
function fmt(n)  { return Math.floor(n).toLocaleString('nl-NL'); }
function nlDate(d){ return d.getDate()+' '+MONTHS_NL[d.getMonth()]+' '+d.getFullYear(); }

function currentAge(dob,now) {
  var a=now.getFullYear()-dob.getFullYear();
  var m=now.getMonth()-dob.getMonth();
  if (m<0||(m===0&&now.getDate()<dob.getDate())) a--;
  return a;
}
function nextBirthday(dob,now) {
  var nb=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
  if (nb<=now) nb.setFullYear(now.getFullYear()+1);
  return nb;
}
function yearProgress(dob,now) {
  var last=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
  if (last>now) last.setFullYear(now.getFullYear()-1);
  var next=new Date(last.getFullYear()+1,last.getMonth(),last.getDate());
  return (now-last)/(next-last);
}
function msDur(ms) {
  var s=Math.floor(ms/1000);
  return {
    days:Math.floor(s/86400), hrs:Math.floor((s%86400)/3600),
    mins:Math.floor((s%3600)/60), secs:s%60,
    totalSecs:s, totalMins:Math.floor(s/60),
    totalHrs:Math.floor(s/3600), totalDays:Math.floor(s/86400)
  };
}
function cdStr(ms) {
  var d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),
      m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  if (d>0) return d+'d '+pad(h)+'u '+pad(m)+'m '+pad(s)+'s';
  if (h>0) return h+'u '+pad(m)+'m '+pad(s)+'s';
  return m+'m '+pad(s)+'s';
}
function ageParts(dob,now) {
  var y=now.getFullYear()-dob.getFullYear(),m=now.getMonth()-dob.getMonth(),d=now.getDate()-dob.getDate();
  if (d<0){ m--; var prev=new Date(now.getFullYear(),now.getMonth(),0); d+=prev.getDate(); }
  if (m<0){ y--; m+=12; }
  return {y:y,m:m,d:d};
}

function zodiacSign(dob) {
  var m=dob.getMonth()+1,d=dob.getDate();
  if((m===3&&d>=21)||(m===4&&d<=19)) return"♈";
  if((m===4&&d>=20)||(m===5&&d<=20)) return"♉";
  if((m===5&&d>=21)||(m===6&&d<=20)) return"♊";
  if((m===6&&d>=21)||(m===7&&d<=22)) return"♋";
  if((m===7&&d>=23)||(m===8&&d<=22)) return"♌";
  if((m===8&&d>=23)||(m===9&&d<=22)) return"♍";
  if((m===9&&d>=23)||(m===10&&d<=22)) return"♎";
  if((m===10&&d>=23)||(m===11&&d<=21)) return"♏";
  if((m===11&&d>=22)||(m===12&&d<=21)) return"♐";
  if((m===12&&d>=22)||(m===1&&d<=19)) return"♑";
  if((m===1&&d>=20)||(m===2&&d<=18)) return"♒";
  return"♓";
}

var CN_EMOJI=["🐀","🐂","🐯","🐇","🐉","🐍","🐎","🐐","🐒","🐓","🐕","🐖"];

// ─── COMPARE ───
var cmpSel = [0, 3];
var cmpNeedsRebuild = true;
var cmpDynEls = null;

function buildCompareSelectors() {
  var picker = document.getElementById('cmp-picker');
  if (!picker) return;
  picker.innerHTML = '';
  var active = activePeople();

  // sanitize cmpSel
  var activeMap = {};
  for (var k=0;k<active.length;k++) activeMap[active[k].i]=true;
  var cleaned = [];
  for (var k=0;k<cmpSel.length;k++) { if (activeMap[cmpSel[k]]) cleaned.push(cmpSel[k]); }
  if (cleaned.length < 2 && active.length >= 2) {
    cleaned = [active[0].i, active[1].i];
  }
  cmpSel = cleaned;

  for (var i=0;i<active.length;i++) {
    var pidx=active[i].i, p=active[i].p;
    var selPos=-1;
    for (var s=0;s<cmpSel.length;s++) { if(cmpSel[s]===pidx){selPos=s;break;} }
    var chip=document.createElement('div');
    chip.className='cmp-chip'+(selPos>=0?' selected':'');
    if (selPos>=0) chip.style.borderColor=p.c;
    chip.innerHTML='<span class="cmp-chip-dot" style="background:'+p.c+'"></span>'+p.name
      +(selPos>=0?'<span class="cmp-chip-badge">'+(selPos+1)+'</span>':'');
    (function(idx,pc){
      chip.onclick=function(){
        var pos=-1;
        for (var s=0;s<cmpSel.length;s++){if(cmpSel[s]===idx){pos=s;break;}}
        if (pos>=0) { if(cmpSel.length>2){cmpSel.splice(pos,1);}else{return;} }
        else { if(cmpSel.length>=3)return; cmpSel.push(idx); }
        buildCompareSelectors();
        updateCompare(new Date());
      };
    })(pidx,p.c);
    picker.appendChild(chip);
  }
  var hint=document.getElementById('cmp-hint');
  if (hint) {
    if (cmpSel.length===2) hint.textContent='Klik op een naam om een derde toe te voegen, of klik een geselecteerde naam om te wisselen';
    else hint.textContent='Klik op een geselecteerde naam om hem eruit te halen';
  }
  cmpNeedsRebuild = true;
}

function updateCompare(now) {
  var res = document.getElementById('cmp-results');
  var indices = cmpSel.slice(0, 3);
  var count = indices.length;
  if (count < 2) { res.classList.remove('visible'); cmpDynEls = null; return; }
  var hasDup = false;
  for (var i = 0; i < indices.length; i++) for (var j = i+1; j < indices.length; j++) if (indices[i] === indices[j]) hasDup = true;
  if (hasDup) { res.classList.remove('visible'); cmpDynEls = null; return; }
  res.classList.add('visible');

  var people = [];
  for (var i = 0; i < count; i++) { var pp = getPerson(indices[i]); if (pp) people.push(pp); }

  // ── Light update (per-second tick, no structural change) ──
  if (!cmpNeedsRebuild && cmpDynEls) {
    var combinedDays = 0, combinedSecs = 0;
    for (var ci = 0; ci < count; ci++) {
      var p = people[ci];
      var dur = msDur(now - p.dob);
      var pts = ageParts(p.dob, now);
      var nb = nextBirthday(p.dob, now);
      var side = cmpDynEls.sides[ci];
      side.elAge.textContent  = pts.y + 'j ' + pts.m + 'm ' + pts.d + 'd';
      side.elDays.textContent = fmt(dur.totalDays);
      side.elCd.textContent   = cdStr(nb - now);
      combinedDays += dur.totalDays;
      combinedSecs += dur.totalSecs;
      if (ci < count - 1 && side.elMore) {
        var a = people[ci], b = people[ci+1];
        var aL = now - a.dob, bL = now - b.dob;
        side.elMore.textContent = (aL > bL ? a.name : b.name) + ' +' + ((Math.max(aL,bL)/Math.min(aL,bL)-1)*100).toFixed(0) + '%';
      }
    }
    var combinedYears = (combinedDays / 365.25).toFixed(1);
    cmpDynEls.elCombYears.textContent = combinedYears + ' jaar';
    cmpDynEls.elCombDays.textContent  = fmt(combinedDays);
    cmpDynEls.elCombSecs.textContent  = fmt(combinedSecs);
    return;
  }

  // ── Full rebuild (selection changed or first render) ──
  var combinedDays = 0, combinedSecs = 0;
  var stats = [];
  for (var i = 0; i < count; i++) {
    var dur = msDur(now - people[i].dob);
    var nb = nextBirthday(people[i].dob, now);
    var pts = ageParts(people[i].dob, now);
    stats.push({dur:dur, nb:nb, pts:pts});
    combinedDays += dur.totalDays;
    combinedSecs += dur.totalSecs;
  }
  var combinedYears = (combinedDays / 365.25).toFixed(1);
  var colClass = count === 3 ? 'three' : 'two';
  var colsHtml = '';

  for (var ci = 0; ci < people.length; ci++) {
    var p = people[ci], st = stats[ci];
    colsHtml += '<div class="compare-side">'
      + '<div class="compare-side-name" style="color:' + p.c + '">' + p.name + '</div>'
      + '<div class="compare-stat"><div class="compare-stat-label">Leeftijd</div><div class="compare-stat-val cmp-age-' + ci + '">' + st.pts.y + 'j ' + st.pts.m + 'm ' + st.pts.d + 'd</div></div>'
      + '<div class="compare-stat"><div class="compare-stat-label">Dagen geleefd</div><div class="compare-stat-val cmp-days-' + ci + '">' + fmt(st.dur.totalDays) + '</div></div>'
      + '<div class="compare-stat"><div class="compare-stat-label">Sterrenbeeld</div><div class="compare-stat-val">' + zodiacSign(p.dob) + ' ' + zodiacName(p.dob) + '</div></div>'
      + '<div class="compare-stat"><div class="compare-stat-label">Volgende verjaardag</div><div class="compare-stat-val cmp-cd-' + ci + '">' + cdStr(st.nb - now) + '</div></div>'
      + '</div>';

    if (ci < people.length - 1) {
      var a = people[ci], b = people[ci+1];
      var older = a.dob < b.dob ? a : b, younger = a.dob < b.dob ? b : a;
      var diffMs = Math.abs(a.dob - b.dob);
      var diffYears = (diffMs / (365.25*24*3600*1000)).toFixed(1);
      var diffDays = Math.floor(diffMs / 86400000);
      var awb = ageParts(older.dob, younger.dob);
      var awbStr = awb.y > 0 ? awb.y + 'j ' + (awb.m > 0 ? awb.m + 'm' : '') : awb.m + 'm';
      var aL = now - a.dob, bL = now - b.dob;
      var morePct = ((Math.max(aL,bL) / Math.min(aL,bL) - 1) * 100).toFixed(0);
      var moreName = aL > bL ? a.name : b.name;
      var sameZ = zodiacName(a.dob) === zodiacName(b.dob);
      colsHtml += '<div class="compare-middle">'
        + '<div class="compare-mid-item"><div class="compare-mid-label">Leeftijdsverschil</div><div class="compare-mid-val accent">' + diffYears + ' jaar / ' + fmt(diffDays) + 'd</div></div>'
        + '<div class="compare-mid-item"><div class="compare-mid-label">Toen ' + younger.name + ' geboren werd</div><div class="compare-mid-val" style="font-size:10px">' + older.name + ' was al ' + awbStr + '</div></div>'
        + '<div class="compare-mid-item"><div class="compare-mid-label">Meer geleefd</div><div class="compare-mid-val accent cmp-more-' + ci + '">' + moreName + ' +' + morePct + '%</div></div>'
        + (sameZ ? '<div class="compare-mid-item"><div class="compare-mid-label">Zelfde sterrenb.</div><div class="compare-mid-val accent">' + zodiacSign(a.dob) + ' ' + zodiacName(a.dob) + '</div></div>' : '')
        + '</div>';
    }
  }

  res.innerHTML = '<div class="compare-cols ' + colClass + '">' + colsHtml + '</div>'
    + '<div class="compare-combined">'
    + '<div class="compare-combined-item"><div class="compare-combined-label">Gecombineerde leeftijd</div><div class="compare-combined-val cmp-comb-years">' + combinedYears + ' jaar</div></div>'
    + '<div class="compare-combined-item"><div class="compare-combined-label">Gecombineerde dagen</div><div class="compare-combined-val cmp-comb-days">' + fmt(combinedDays) + '</div></div>'
    + '<div class="compare-combined-item"><div class="compare-combined-label">Gecombineerde seconden</div><div class="compare-combined-val cmp-comb-secs">' + fmt(combinedSecs) + '</div></div>'
    + '</div>';

  // Store refs to dynamic elements for future light updates
  cmpDynEls = { sides: [] };
  for (var ci = 0; ci < count; ci++) {
    cmpDynEls.sides.push({
      elAge:  res.querySelector('.cmp-age-'  + ci),
      elDays: res.querySelector('.cmp-days-' + ci),
      elCd:   res.querySelector('.cmp-cd-'   + ci),
      elMore: ci < count - 1 ? res.querySelector('.cmp-more-' + ci) : null
    });
  }
  cmpDynEls.elCombYears = res.querySelector('.cmp-comb-years');
  cmpDynEls.elCombDays  = res.querySelector('.cmp-comb-days');
  cmpDynEls.elCombSecs  = res.querySelector('.cmp-comb-secs');
  cmpNeedsRebuild = false;
}

var spectrumYear = null; // null = live
var spectrumDone = false;

function spectrumRefDate() {
  if (spectrumYear === null) return new Date();
  var now = new Date();
  return new Date(spectrumYear, now.getMonth(), now.getDate());
}

function updateSpectrumYearUI() {

(function(){
  var box = document.getElementById('spectrum-year-box');
  var btn = document.getElementById('spectrum-now-btn');
  var scrollAcc = 0;
  box.addEventListener('wheel', function(e){
    e.preventDefault();
    scrollAcc += e.deltaY;
    if (Math.abs(scrollAcc) >= 40) {
      var dir = scrollAcc > 0 ? 1 : -1;
      scrollAcc = 0;
      var now = new Date();
      var current = spectrumYear === null ? now.getFullYear() : spectrumYear;
      spectrumYear = current - dir; // scroll up = earlier years
      if (spectrumYear === now.getFullYear()) spectrumYear = null;
      updateSpectrumYearUI();
      buildSpectrum();
    }
  }, {passive:false});
  btn.onclick = function(){
    spectrumYear = null;
    updateSpectrumYearUI();
    buildSpectrum();
  };
})();

function buildSpectrum() {
  var refDate = spectrumRefDate();
  var sp = document.getElementById('spectrum');
  var old = sp.querySelectorAll('.spectrum-dot,.spectrum-tick');
  for (var i=0;i<old.length;i++) sp.removeChild(old[i]);

  updateSpectrumYearUI();

  var active = activePeople();
  var maxAge = 0;
  for (var i=0;i<active.length;i++){
    var a=(refDate-active[i].p.dob)/(365.25*24*3600*1000);
    if (a>maxAge) maxAge=a;
  }
  maxAge = Math.ceil(maxAge/10)*10+5;
  if (maxAge<10) maxAge=10;

  for (var t=0;t<=maxAge;t+=10){
    var el=document.createElement('div'); el.className='spectrum-tick';
    el.style.left=((t/maxAge)*100)+'%'; el.textContent=t; sp.appendChild(el);
  }

  for (var i=0;i<active.length;i++){
    var p=active[i].p, pidx=active[i].i;
    var ageF=(refDate-p.dob)/(365.25*24*3600*1000);
    if (ageF < 0) continue; // not born yet in selected year
    var pct=(ageF/maxAge)*100;
    var dot=document.createElement('div'); dot.className='spectrum-dot';
    dot.style.left=pct+'%';
    var flip=pct>75;
    var lbl=document.createElement('div'); lbl.className='spectrum-dot-label';
    lbl.style.color=p.c;
    lbl.style.transform=flip?'translateX(calc(-100% + 4px))':'translateX(0)';
    lbl.textContent=p.name;
    var circle=document.createElement('div'); circle.className='spectrum-dot-circle';
    circle.style.background=p.c; circle.style.boxShadow='0 0 8px '+p.c;
    var ageLabel=document.createElement('div'); ageLabel.className='spectrum-dot-age';
    ageLabel.style.transform='translateX(-50%)';
    ageLabel.textContent=ageF.toFixed(1)+'j';
    var hideBtn=document.createElement('div'); hideBtn.className='spectrum-dot-hide';
    hideBtn.textContent='✕'; hideBtn.title=p.name+' verbergen';
    dot.appendChild(lbl); dot.appendChild(circle); dot.appendChild(ageLabel); dot.appendChild(hideBtn);
    (function(ri){
      dot.onclick=function(e){ if(e.target===hideBtn)return; if(spectrumYear===null)openFullscreen(ri); };
      hideBtn.onclick=function(e){ e.stopPropagation(); hidePerson(ri); };
    })(pidx);
    sp.appendChild(dot);
  }
  spectrumDone = true;
  buildSpectrumSidebar();
}

function buildSpectrumSidebar() {
  var inner = document.getElementById('sp-sb-inner');
  if (!inner) return;
  inner.innerHTML = '';

  var refDate = spectrumRefDate();
  var active = activePeople();
  var maxAge = 0;
  for (var i = 0; i < active.length; i++) {
    var a = (refDate - active[i].p.dob) / (365.25 * 24 * 3600 * 1000);
    if (a > maxAge) maxAge = a;
  }
  maxAge = Math.ceil(maxAge / 10) * 10 + 5;
  if (maxAge < 10) maxAge = 10;

  var axis = document.createElement('div');
  axis.className = 'sp-sb-axis';
  inner.appendChild(axis);

  for (var t = 0; t <= maxAge; t += 10) {
    var tick = document.createElement('div');
    tick.className = 'sp-sb-tick';
    // oldest at top (low top%), youngest at bottom (high top%)
    tick.style.top = ((1 - t / maxAge) * 90 + 5) + '%';
    tick.textContent = t;
    inner.appendChild(tick);
  }

  for (var i = 0; i < active.length; i++) {
    var p = active[i].p, pidx = active[i].i;
    var ageF = (refDate - p.dob) / (365.25 * 24 * 3600 * 1000);
    if (ageF < 0) continue;
    var topPct = (1 - ageF / maxAge) * 90 + 5;

    var person = document.createElement('div');
    person.className = 'sp-sb-person';
    person.style.top = topPct + '%';
    person.innerHTML =
      '<div class="sp-sb-dot" style="background:' + p.c + ';box-shadow:0 0 7px ' + p.c + '55"></div>'
      + '<div class="sp-sb-tip"><span style="color:' + p.c + '">' + p.name + '</span>'
      + '<span class="sp-sb-tip-age">' + ageF.toFixed(1) + ' jaar</span></div>';

    (function(ri) {
      person.onclick = function() { if (spectrumYear === null) openFullscreen(ri); };
    })(pidx);
    inner.appendChild(person);
  }
  updateSidebarYearUI();
}

function updateSidebarYearUI() {
  var yearEl = document.getElementById('sp-sb-year');
  var nowBtn = document.getElementById('sp-sb-now');
  if (!yearEl) return;
  var now = new Date();
  yearEl.textContent = spectrumYear === null ? now.getFullYear() : spectrumYear;
  if (nowBtn) {
    if (spectrumYear !== null && spectrumYear !== now.getFullYear()) nowBtn.classList.add('vis');
    else nowBtn.classList.remove('vis');
  }
}

(function() {
  function changeSpectrumYear(dir) {
    var now = new Date();
    var cur = spectrumYear === null ? now.getFullYear() : spectrumYear;
    spectrumYear = cur + dir;
    if (spectrumYear === now.getFullYear()) spectrumYear = null;
    updateSpectrumYearUI();
    spectrumDone = false;
    buildSpectrum();

  var sbUp   = document.getElementById('sp-sb-up');
  var sbDown = document.getElementById('sp-sb-down');

  var arrPrev = document.getElementById('spectrum-arr-prev');
  var arrNext = document.getElementById('spectrum-arr-next');
  if (sbUp)   sbUp.onclick   = function() { changeSpectrumYear(+1); };
  if (sbDown) sbDown.onclick = function() { changeSpectrumYear(-1); };
  if (sbNow)  sbNow.onclick  = function() { spectrumYear=null; updateSpectrumYearUI(); buildSpectrum(); };
  if (arrPrev) arrPrev.onclick = function() { changeSpectrumYear(-1); };

var overviewDone = false;
function buildOverview(now) {
  var ov=document.getElementById('overview');
  var active=activePeople();
  if (!active.length){ov.innerHTML='';return;}
  var sorted=[];
  for (var i=0;i<active.length;i++) sorted.push({p:active[i].p,nb:nextBirthday(active[i].p.dob,now)});
  sorted.sort(function(a,b){return a.nb-b.nb;});
  var nxt=sorted[0], msU=nxt.nb-now;
  var isToday=nxt.nb.getDate()===now.getDate()&&nxt.nb.getMonth()===now.getMonth();
  var totalYears=0;
  for (var i=0;i<active.length;i++) totalYears+=currentAge(active[i].p.dob,now);
  var youngest=active[0].p, oldest=active[0].p;
  for (var i=1;i<active.length;i++){
    if(active[i].p.dob>youngest.dob) youngest=active[i].p;
    if(active[i].p.dob<oldest.dob) oldest=active[i].p;
  }
  var upStr='';
  for (var i=0;i<Math.min(3,sorted.length);i++){
    var dd=Math.floor((sorted[i].nb-now)/86400000);
    upStr+=sorted[i].p.name+' ('+(dd===0?'vandaag':dd+'d')+')';
    if(i<Math.min(2,sorted.length-1)) upStr+=' · ';
  }
  ov.innerHTML=
    '<div class="ov next" style="--next-color:'+nxt.p.c+';animation-delay:.06s">'
    +'<div class="ov-label">Volgende jarige</div>'
    +'<div class="ov-value" style="color:'+nxt.p.c+'">'+nxt.p.name+'</div>'
    +'<div class="ov-sub">'+(isToday?'🎂 vandaag!':cdStr(msU))+'</div></div>'
    +'<div class="ov" style="animation-delay:.09s"><div class="ov-label">Komende verjaardagen</div><div class="ov-value" style="font-size:10px;color:var(--text)">'+upStr+'</div></div>'
    +'<div class="ov" style="animation-delay:.12s"><div class="ov-label">Jongste · Oudste</div><div class="ov-value" style="font-size:11px"><span style="color:'+youngest.c+'">'+youngest.name+'</span> · <span style="color:'+oldest.c+'">'+oldest.name+'</span></div><div class="ov-sub">'+currentAge(youngest.dob,now)+' · '+currentAge(oldest.dob,now)+' jaar</div></div>'
    +'<div class="ov" style="animation-delay:.15s"><div class="ov-label">Totaal geleefd</div><div class="ov-value">'+totalYears+' jaar</div><div class="ov-sub">'+active.length+' personen</div></div>';

}

    ce.elExact[2].textContent = pts.d + 'd';
    ce.elExact[3].textContent = pad(dur.hrs) + 'u';
    ce.elExact[4].textContent = pad(dur.mins) + 'm';

function openFullscreen(idx) {
  fsIdx=idx;
  var overlay=document.getElementById('fs-overlay');
  overlay.classList.add('open');
  overlay.scrollTop=0;
  document.body.style.overflow='hidden';
  renderFS(idx,new Date());
  if (fsTick) clearInterval(fsTick);
  fsTick=setInterval(function(){
    if (fsIdx<0) return;
    var now=new Date(), p=getPerson(fsIdx);
    if (!p) { closeFullscreen(); return; }
    var dur=msDur(now-p.dob), pts=ageParts(p.dob,now), nb=nextBirthday(p.dob,now);
    var isToday=nb.getDate()===now.getDate()&&nb.getMonth()===now.getMonth();
    function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
    set('fs-days',   fmt(dur.totalDays));
    set('fs-hrs',    fmt(dur.totalHrs));
    set('fs-mins',   fmt(dur.totalMins));
    set('fs-secs',   fmt(dur.totalSecs));
    set('fs-exact',  pts.y+'j '+pts.m+'m '+pts.d+'d '+pad(dur.hrs)+'u '+pad(dur.mins)+'m '+pad(dur.secs)+'s');
    set('fs-bd-cd',  isToday?'🎂 Vandaag jarig!':cdStr(nb-now));
    set('fs-heartbeats', fmt(Math.round(dur.totalSecs*(66/60))));
    set('fs-breaths',    fmt(Math.round(dur.totalSecs*(15/60))));
    set('fs-blinks',     fmt(Math.round(dur.totalSecs*(10/60))));
    set('fs-steps',      fmt(Math.round(dur.totalDays*7500)));
  },1000);
}

function closeFullscreen() {
  fsIdx=-1;
  document.getElementById('fs-overlay').classList.remove('open');
  document.body.style.overflow='';
  if (fsTick){clearInterval(fsTick);fsTick=null;}
}

document.getElementById('fs-close').onclick=closeFullscreen;
document.getElementById('fs-bg').onclick=closeFullscreen;

// ─── CONFETTI ───
var confettiCanvas = null, confettiCtx = null;
var confettiParticles = [], confettiAnimating = false;

function initConfettiCanvas() {
  confettiCanvas = document.createElement('canvas');
  confettiCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
  document.body.appendChild(confettiCanvas);
  confettiCtx = confettiCanvas.getContext('2d');
  resizeConfetti();
  window.addEventListener('resize', resizeConfetti);
}
function resizeConfetti() {
  if (!confettiCanvas) return;
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}

function launchConfetti(colors) {
  if (!confettiCanvas) initConfettiCanvas();
  var W = confettiCanvas.width, H = confettiCanvas.height;
  // Two cannons at bottom corners, shooting inward and up
  var cannons = [
    { x: W * 0.12, y: H * 0.95, aMin: -Math.PI * 0.82, aMax: -Math.PI * 0.45 },
    { x: W * 0.88, y: H * 0.95, aMin: -Math.PI * 0.55, aMax: -Math.PI * 0.18 }
  ];
  // Extend palette with white and gold for extra sparkle
  var palette = colors.slice();
  palette.push('#ffffff', '#f5d76e');
  var perCannon = 110;
  for (var ci = 0; ci < cannons.length; ci++) {
    var c = cannons[ci];
    for (var i = 0; i < perCannon; i++) {
      var angle = c.aMin + Math.random() * (c.aMax - c.aMin);
      var speed = 9 + Math.random() * 14;
      var sr = Math.random();
      var shape = sr < 0.55 ? 'rect' : sr < 0.80 ? 'circle' : 'ribbon';
      var w = shape === 'ribbon' ? 2 + Math.random() * 3  : 6 + Math.random() * 9;
      var h = shape === 'ribbon' ? 18 + Math.random() * 20 : 4 + Math.random() * 7;
      confettiParticles.push({
        x:      c.x + (Math.random() - 0.5) * 30,
        y:      c.y,
        vx:     Math.cos(angle) * speed,
        vy:     Math.sin(angle) * speed,
        rot:    Math.random() * Math.PI * 2,
        rotSpd: (Math.random() - 0.5) * 0.22,
        wob:    Math.random() * Math.PI * 2,
        wobSpd: 0.025 + Math.random() * 0.055,
        wobAmp: 0.6   + Math.random() * 2.0,
        grav:   0.22  + Math.random() * 0.18,
        drag:   0.988,
        w: w, h: h, shape: shape,
        col:   palette[Math.floor(Math.random() * palette.length)],
        alpha: 1
      });
    }
  }
  if (!confettiAnimating) { confettiAnimating = true; requestAnimationFrame(tickConfetti); }
}

function tickConfetti() {
  var W = confettiCanvas.width, H = confettiCanvas.height;
  confettiCtx.clearRect(0, 0, W, H);
  var alive = 0;
  for (var i = 0; i < confettiParticles.length; i++) {
    var p = confettiParticles[i];
    if (p.alpha <= 0) continue;
    alive++;
    p.vx *= p.drag;
    p.vy  = p.vy * p.drag + p.grav;
    p.wob += p.wobSpd;
    p.x   += p.vx + Math.sin(p.wob) * p.wobAmp;
    p.y   += p.vy;
    p.rot += p.rotSpd;
    if (p.y > H * 0.80) p.alpha -= 0.022;
    if (p.x < -80 || p.x > W + 80) { p.alpha = 0; continue; }
    confettiCtx.save();
    confettiCtx.globalAlpha = p.alpha > 0 ? p.alpha : 0;
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.fillStyle = p.col;
    if (p.shape === 'circle') {
      // Disc that flattens as it rotates (simulates spinning)
      var sy = Math.abs(Math.sin(p.rot * 1.3)) * 0.7 + 0.15;
      confettiCtx.scale(1, sy);
      confettiCtx.beginPath();
      confettiCtx.arc(0, 0, p.w * 0.5, 0, Math.PI * 2);
      confettiCtx.fill();
    } else if (p.shape === 'ribbon') {
      confettiCtx.fillRect(-p.w * 0.5, -p.h * 0.5, p.w, p.h);
    } else {
      // Rectangle that flips on its axis (3D effect)
      var sy2 = Math.abs(Math.cos(p.rot * 1.5));
      confettiCtx.scale(1, sy2 < 0.08 ? 0.08 : sy2);
      confettiCtx.fillRect(-p.w * 0.5, -p.h * 0.5, p.w, p.h);
    }
    confettiCtx.restore();
  }
  if (alive > 0) {
    requestAnimationFrame(tickConfetti);
  } else {
    confettiCtx.clearRect(0, 0, W, H);
    confettiAnimating = false;
    confettiParticles = [];
  }
}

function checkBirthdayConfetti(now) {
  var colors = [], active = activePeople();
  for (var i = 0; i < active.length; i++) {
    var dob = active[i].p.dob;

  }
  if (colors.length) launchConfetti(colors);
}

// ─── CALENDAR ───
var calYear=new Date().getFullYear();

function buildCalendar() {
  var grid=document.getElementById('cal-grid');
  if (!grid) return;
  var today=new Date();
  var active=activePeople();

  // build birthday lookup
  var bdMap={};
  for (var pi=0;pi<active.length;pi++){
    var p=active[pi].p, pidx=active[pi].i;
    var m=p.dob.getMonth(), d=p.dob.getDate();
    var key=m+'-'+d;
    if (!bdMap[key]) bdMap[key]=[];
    bdMap[key].push({name:p.name,color:p.c,age:calYear-p.dob.getFullYear(),pidx:pidx});
  }

  var DAY_NAMES=['ma','di','wo','do','vr','za','zo'];
  var MONTH_NAMES=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

  var html='';
  for (var mo=0;mo<12;mo++){
    var firstDay=new Date(calYear,mo,1).getDay();
    var startOffset=(firstDay+6)%7;
    var daysInMonth=new Date(calYear,mo+1,0).getDate();
    html+='<div class="cal-month">';
    html+='<div class="cal-month-name">'+MONTH_NAMES[mo]+'</div>';
    html+='<div class="cal-days-head">';
    for (var dn=0;dn<7;dn++) html+='<div class="cal-dh">'+DAY_NAMES[dn]+'</div>';
    html+='</div><div class="cal-days">';
    for (var e=0;e<startOffset;e++) html+='<div class="cal-day empty"></div>';
    for (var day=1;day<=daysInMonth;day++){
      var isToday=(calYear===today.getFullYear()&&mo===today.getMonth()&&day===today.getDate());
      var key=mo+'-'+day;
      var bds=bdMap[key]||[];
      var cls='cal-day'+(isToday?' today':'')+(bds.length?' has-bd':'');
      var extra='';
      if (bds.length){
        var names=[];
        for (var bi=0;bi<bds.length;bi++) names.push(bds[bi].name+' ('+bds[bi].age+')');
        extra+=' data-pidx="'+bds[0].pidx+'"';
        extra+=' data-tooltip="'+names.join(', ')+'"';
        extra+=' style="background:'+bds[0].color+'22;color:'+bds[0].color+'"';
        var dots='<div class="cal-day-dot-wrap">';
        for (var bi=0;bi<bds.length&&bi<3;bi++) dots+='<div class="cal-day-dot" style="background:'+bds[bi].color+'"></div>';
        dots+='</div>';
        html+='<div class="'+cls+'"'+extra+'>'+day+dots+'</div>';
      } else {
        html+='<div class="'+cls+'">'+day+'</div>';
      }
    }
    html+='</div></div>';
  }
  grid.innerHTML=html;
  var inp=document.getElementById('cal-year-input');
  if (inp) inp.value=calYear;
}

// Calendar click & tooltip
(function(){
  var tooltip=document.getElementById('cal-tooltip');
  var grid=document.getElementById('cal-grid');

  grid.addEventListener('click',function(e){
    var el=e.target;
    while(el&&el!==grid){
      if(el.hasAttribute('data-pidx')){
        var idx=parseInt(el.getAttribute('data-pidx'));
        openFullscreen(idx);
        return;
      }
      el=el.parentNode;
    }
  });

  grid.addEventListener('mousemove',function(e){
    var el=e.target;
    while(el&&el!==grid){
      if(el.hasAttribute('data-tooltip')){
        tooltip.textContent=el.getAttribute('data-tooltip');
        tooltip.style.left=e.clientX+'px';
        tooltip.style.top=e.clientY+'px';
        tooltip.classList.add('visible');
        return;
      }
      el=el.parentNode;
    }
    tooltip.classList.remove('visible');
  });

  grid.addEventListener('mouseleave',function(){
    tooltip.classList.remove('visible');
  });
})();

document.getElementById('cal-prev').onclick=function(){calYear--;buildCalendar();};
document.getElementById('cal-next').onclick=function(){calYear++;buildCalendar();};
document.getElementById('cal-year-input').onchange=function(){

};
document.getElementById('cal-year-input').onkeydown=function(e){
  if(e.key==='Enter'){var v=parseInt(this.value);if(v>1900&&v<2200){calYear=v;buildCalendar();}}
};

var tourStep=0, tourActive=false;

function positionTourCard(targetEl) {
  var card=document.getElementById('tour-card');
  var spot=document.getElementById('tour-spotlight');
  if (!targetEl){ spot.style.opacity='0'; card.style.top='50%'; card.style.left='50%'; card.style.transform='translate(-50%,-50%)'; return; }
  spot.style.opacity='1';
  card.style.transform='none';
  var rect=targetEl.getBoundingClientRect();
  var pad=10;
  spot.style.top=(rect.top-pad)+'px'; spot.style.left=(rect.left-pad)+'px';
  spot.style.width=(rect.width+pad*2)+'px'; spot.style.height=(rect.height+pad*2)+'px';
  targetEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  var cardW=Math.min(300,window.innerWidth-32);
  var cx=rect.left+rect.width/2;
  var cardLeft=Math.min(Math.max(cx-cardW/2,12),window.innerWidth-cardW-12);
  var spaceBelow=window.innerHeight-rect.bottom-pad;
  var cardTop;
  if (spaceBelow>=200) cardTop=rect.bottom+pad+12;
  else cardTop=Math.max(12,rect.top-pad-220);
  card.style.left=cardLeft+'px'; card.style.top=cardTop+'px'; card.style.maxWidth=cardW+'px';
}

function renderTourStep() {
  var step=TOUR_STEPS[tourStep], total=TOUR_STEPS.length;
  document.getElementById('tour-step-label').textContent='stap '+(tourStep+1)+' / '+total;
  document.getElementById('tour-title').textContent=step.title;
  document.getElementById('tour-body').innerHTML=step.body;
  var dots=document.getElementById('tour-dots'); dots.innerHTML='';
  for (var i=0;i<total;i++){
    var d=document.createElement('div');
    d.className='tour-dot'+(i===tourStep?' active':'');
    dots.appendChild(d);
  }
  document.getElementById('tour-prev').style.display=tourStep===0?'none':'';
  document.getElementById('tour-next').textContent=tourStep===total-1?'klaar':'volgende';
  var targetEl=step.target?document.getElementById(step.target):null;
  setTimeout(function(){positionTourCard(targetEl);},80);
}

function openTour() {
  tourStep=0; tourActive=true;
  document.getElementById('tour-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  renderTourStep();
}
function closeTour() {
  tourActive=false;
  document.getElementById('tour-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('tour-btn').onclick=openTour;
document.getElementById('tour-dim').onclick=closeTour;
document.getElementById('tour-card').onclick=function(e){e.stopPropagation();};
document.getElementById('tour-next').onclick=function(){
  if(tourStep>=TOUR_STEPS.length-1){closeTour();return;}
  tourStep++; renderTourStep();
};
document.getElementById('tour-prev').onclick=function(){
  if(tourStep<=0)return; tourStep--; renderTourStep();
};

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(tourActive){closeTour();return;}
    if(fsIdx>=0){closeFullscreen();return;}

    if(e.key==='ArrowRight'||e.key==='Enter') document.getElementById('tour-next').click();
